[project]
name = "dr-tools-firecrawl"
version = "0.1.0"
description = "Firecrawl Agent client for Deep Research Agent"
requires-python = ">=3.12"
dependencies = [
    "firecrawl-py>=1.0",
    "pydantic>=2.0",
    "dr-types",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dr_tools_firecrawl"]
