[project]
name = "dr-tools-perplexity"
version = "0.1.0"
description = "Perplexity Sonar client for Deep Research Agent"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "dr-types",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dr_tools_perplexity"]
