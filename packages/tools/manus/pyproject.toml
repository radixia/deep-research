[project]
name = "dr-tools-manus"
version = "0.1.0"
description = "Manus API client for Deep Research Agent"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "dr-types",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dr_tools_manus"]
