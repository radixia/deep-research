[project]
name = "dr-tools-tavily"
version = "0.1.0"
description = "Tavily Search client for Deep Research Agent"
requires-python = ">=3.12"
dependencies = [
    "tavily-python>=0.3",
    "dr-types",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dr_tools_tavily"]
