[project]
name = "dr-orchestrator"
version = "0.1.0"
description = "Research Orchestrator — query planner and tool router"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "dr-types",
    "dr-tools-manus",
    "dr-tools-perplexity",
    "dr-tools-tavily",
    "dr-tools-firecrawl",
    "dr-fusion",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dr_orchestrator"]
