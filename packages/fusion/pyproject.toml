[project]
name = "dr-fusion"
version = "0.1.0"
description = "Fusion Engine — merge, dedup, rank, and synthesize research results"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "dr-types",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dr_fusion"]
